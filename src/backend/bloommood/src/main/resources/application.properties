spring.application.name=bloodmood
server.port=3001



#postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/bloommood
spring.datasource.username=bloommood
spring.datasource.password=bloommood123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

#jwt time
app.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS
app.jwt.expiration-ms=3600000


#cors
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# log ??
spring.jackson.time-zone=Asia/Taipei
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Taipei



# Must match Google Console redirect URI exactly
app.google.token-uri=https://oauth2.googleapis.com/token

app.google.client-id=${APP_GOOGLE_CLIENT_ID:}
app.google.client-secret=${APP_GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${APP_GOOGLE_REDIRECT_URI:http://localhost:3000}

# JWT cookie settings (HttpOnly)
app.jwt.cookie.name=accessToken
# default: align with app.jwt.expiration-ms (3600000ms = 1h)
app.jwt.cookie.max-age-seconds=3600
app.jwt.cookie.secure=false
app.jwt.cookie.same-site=Lax





