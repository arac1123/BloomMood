# Test datasource (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:bloommood_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Required by SecurityConfig
app.jwt.secret=TEST_SECRET_CHANGE_ME_32_CHARS_MINIMUM____
app.jwt.expiration-ms=3600000

# Google OAuth config for tests
app.google.client-id=test-client-id
app.google.client-secret=test-client-secret
app.google.redirect-uri=http://localhost:3000/auth/google/callback
app.google.token-uri=https://oauth2.googleapis.com/token

# JWT cookie settings for tests
app.jwt.cookie.name=accessToken
app.jwt.cookie.max-age-seconds=3600
app.jwt.cookie.secure=false
app.jwt.cookie.same-site=Lax
